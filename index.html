<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>공시 다운로드</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 980px;
      margin: 40px auto;
      line-height: 1.5;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 18px;
      padding-bottom: 8px;
      border-bottom: 2px solid #ddd;
    }

    .section {
      margin-bottom: 50px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      font-weight: bold;
    }

    input[type="date"], input[type="text"], select {
      padding: 8px;
      width: 320px;
      font-size: 14px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .suggestions {
      border: 1px solid #ccc;
      width: 320px;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 4px;
      display: none;
      background: white;
    }

    .suggestion-item {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .suggestion-item:hover {
      background: #f5f5f5;
    }

    .chips {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: #eef3ff;
      border: 1px solid #b7c8ff;
      padding: 6px 10px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .chip button {
      border: none;
      background: transparent;
      color: #333;
      font-weight: bold;
      cursor: pointer;
      padding: 0;
    }

    .progress-wrap {
      margin-top: 24px;
      display: none;
    }

    .progress-bar-bg {
      width: 100%;
      height: 24px;
      background: #eee;
      border-radius: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #4a78ff;
      transition: width 0.4s ease;
    }

    .progress-text {
      margin-top: 8px;
      font-size: 14px;
    }

    .error-box {
      margin-top: 16px;
      color: #b00020;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .hint {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="section">
    <h2>~2025 정기주주총회 결과 및 찬반률(기업지배구조보고서)</h2>

    <div class="field">
      <label>시작일</label><br>
      <input type="date" id="cgStartDate">
    </div>

    <div class="field">
      <label>종료일</label><br>
      <input type="date" id="cgEndDate">
    </div>

    <div class="field">
      <label>회사 선택 방식</label><br>
      <select id="cgCompanyMode" onchange="toggleCompanyMode('cg')">
        <option value="all" selected>전부</option>
        <option value="select">선택</option>
      </select>
    </div>

    <div id="cgCompanySelectArea" class="field hidden">
      <label>회사명 선택</label>
      <div class="hint">검색 후 추천 목록에서 선택하고, + 버튼으로 여러 회사를 추가하세요.</div>
      <div id="cgSuggestionStatus" class="hint"></div>

      <div class="row" style="margin-top: 8px;">
        <input type="text" id="cgCompanySearch" placeholder="회사명을 입력하세요">
        <button type="button" onclick="addSelectedCompany('cg')">+</button>
      </div>

      <div id="cgSuggestions" class="suggestions"></div>
      <div id="cgSelectedCompanies" class="chips"></div>
    </div>

    <button onclick="startDownload('cg')">엑셀 다운로드</button>

    <div class="progress-wrap" id="cgProgressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="cgProgressFill"></div>
      </div>
      <div class="progress-text" id="cgProgressText">대기 중...</div>
    </div>

    <div class="error-box" id="cgErrorBox"></div>
  </div>

  <div class="section">
    <h2>2026~ 정기주주총회 결과 및 찬반률(정기주주총회결과)</h2>

    <div class="field">
      <label>시작일</label><br>
      <input type="date" id="rmStartDate">
    </div>

    <div class="field">
      <label>종료일</label><br>
      <input type="date" id="rmEndDate">
    </div>

    <div class="field">
      <label>회사 선택 방식</label><br>
      <select id="rmCompanyMode" onchange="toggleCompanyMode('rm')">
        <option value="all" selected>전부</option>
        <option value="select">선택</option>
      </select>
    </div>

    <div id="rmCompanySelectArea" class="field hidden">
      <label>회사명 선택</label>
      <div class="hint">검색 후 추천 목록에서 선택하고, + 버튼으로 여러 회사를 추가하세요.</div>
      <div id="rmSuggestionStatus" class="hint"></div>

      <div class="row" style="margin-top: 8px;">
        <input type="text" id="rmCompanySearch" placeholder="회사명을 입력하세요">
        <button type="button" onclick="addSelectedCompany('rm')">+</button>
      </div>

      <div id="rmSuggestions" class="suggestions"></div>
      <div id="rmSelectedCompanies" class="chips"></div>
    </div>

    <button onclick="startDownload('rm')">엑셀 다운로드</button>

    <div class="progress-wrap" id="rmProgressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="rmProgressFill"></div>
      </div>
      <div class="progress-text" id="rmProgressText">대기 중...</div>
    </div>

    <div class="error-box" id="rmErrorBox"></div>
  </div>

  <div class="section">
    <h2>국민연금 의결권행사</h2>

    <div class="field">
      <label>시작일</label><br>
      <input type="date" id="npsStartDate">
    </div>

    <div class="field">
      <label>종료일</label><br>
      <input type="date" id="npsEndDate">
    </div>

    <div class="field">
      <label>회사 선택 방식</label><br>
      <select id="npsCompanyMode" onchange="toggleCompanyMode('nps')">
        <option value="all" selected>전부</option>
        <option value="select">선택</option>
      </select>
    </div>

    <div id="npsCompanySelectArea" class="field hidden">
      <label>회사명 선택</label>
      <div class="hint">검색 후 추천 목록에서 선택하고, + 버튼으로 여러 회사를 추가하세요.</div>
      <div id="npsSuggestionStatus" class="hint"></div>

      <div class="row" style="margin-top: 8px;">
        <input type="text" id="npsCompanySearch" placeholder="회사명을 입력하세요">
        <button type="button" onclick="addSelectedCompany('nps')">+</button>
      </div>

      <div id="npsSuggestions" class="suggestions"></div>
      <div id="npsSelectedCompanies" class="chips"></div>
    </div>

    <button onclick="startDownload('nps')">엑셀 다운로드</button>

    <div class="progress-wrap" id="npsProgressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="npsProgressFill"></div>
      </div>
      <div class="progress-text" id="npsProgressText">대기 중...</div>
    </div>

    <div class="error-box" id="npsErrorBox"></div>
  </div>

  <script>
    const state = {
      cg: { selectedCompanies: [], selectedSuggestion: null, pollTimer: null, suggestionTimer: null },
      rm: { selectedCompanies: [], selectedSuggestion: null, pollTimer: null, suggestionTimer: null },
      nps: { selectedCompanies: [], selectedSuggestion: null, pollTimer: null, suggestionTimer: null }
    };

    function setDateRanges() {
      const today = new Date().toISOString().split("T")[0];

      document.getElementById("cgStartDate").max = today;
      document.getElementById("cgEndDate").max = today;

      document.getElementById("rmStartDate").min = "2026-01-01";
      document.getElementById("rmEndDate").min = "2026-01-01";
      document.getElementById("rmStartDate").max = today;
      document.getElementById("rmEndDate").max = today;

      // 국민연금은 미래 종료일 허용: max 설정하지 않음
      // document.getElementById("npsStartDate").max = today;
      // document.getElementById("npsEndDate").max = today;
    }

    function toggleCompanyMode(prefix) {
      const mode = document.getElementById(`${prefix}CompanyMode`).value;
      const area = document.getElementById(`${prefix}CompanySelectArea`);

      if (mode === "select") {
        area.classList.remove("hidden");
      } else {
        area.classList.add("hidden");
        state[prefix].selectedCompanies = [];
        state[prefix].selectedSuggestion = null;
        document.getElementById(`${prefix}CompanySearch`).value = "";
        document.getElementById(`${prefix}Suggestions`).style.display = "none";
        document.getElementById(`${prefix}SuggestionStatus`).textContent = "";
        renderSelectedCompanies(prefix);
      }
    }

    function renderSelectedCompanies(prefix) {
      const container = document.getElementById(`${prefix}SelectedCompanies`);
      container.innerHTML = "";

      state[prefix].selectedCompanies.forEach((company) => {
        const chip = document.createElement("div");
        chip.className = "chip";

        const text = document.createElement("span");
        text.textContent = company;

        const btn = document.createElement("button");
        btn.textContent = "×";
        btn.onclick = () => removeCompany(prefix, company);

        chip.appendChild(text);
        chip.appendChild(btn);
        container.appendChild(chip);
      });
    }

    function removeCompany(prefix, company) {
      state[prefix].selectedCompanies = state[prefix].selectedCompanies.filter(c => c !== company);
      renderSelectedCompanies(prefix);
    }

    async function fetchSuggestions(prefix) {
      const q = document.getElementById(`${prefix}CompanySearch`).value.trim();
      const suggestionsBox = document.getElementById(`${prefix}Suggestions`);
      const statusBox = document.getElementById(`${prefix}SuggestionStatus`);

      state[prefix].selectedSuggestion = null;
      suggestionsBox.innerHTML = "";

      if (q.length < 2) {
        suggestionsBox.style.display = "none";
        statusBox.textContent = "두 글자 이상 입력하세요.";
        return;
      }

      statusBox.textContent = "회사명 검색 중...";

      try {
        const res = await fetch(`/company-suggestions?q=${encodeURIComponent(q)}`);
        const text = await res.text();

        let data = {};
        try {
          data = JSON.parse(text);
        } catch (e) {
          suggestionsBox.style.display = "none";
          statusBox.textContent = "회사명 추천 응답 해석 실패";
          return;
        }

        if (!data.companies || data.companies.length === 0) {
          suggestionsBox.style.display = "none";
          statusBox.textContent = "일치하는 회사명이 없습니다.";
          return;
        }

        data.companies.forEach((company) => {
          if (state[prefix].selectedCompanies.includes(company)) return;

          const div = document.createElement("div");
          div.className = "suggestion-item";
          div.textContent = company;
          div.onclick = () => {
            state[prefix].selectedSuggestion = company;
            document.getElementById(`${prefix}CompanySearch`).value = company;
            suggestionsBox.style.display = "none";
            statusBox.textContent = `선택됨: ${company}`;
          };
          suggestionsBox.appendChild(div);
        });

        suggestionsBox.style.display = suggestionsBox.children.length ? "block" : "none";
        statusBox.textContent = suggestionsBox.children.length
          ? "추천 목록에서 회사를 선택하세요."
          : "일치하는 회사명이 없습니다.";

      } catch (e) {
        suggestionsBox.style.display = "none";
        statusBox.textContent = "회사명 추천을 불러오지 못했습니다.";
      }
    }

    function addSelectedCompany(prefix) {
      const input = document.getElementById(`${prefix}CompanySearch`);
      const value = input.value.trim();
      const statusBox = document.getElementById(`${prefix}SuggestionStatus`);

      if (!value) {
        alert("회사명을 입력하거나 추천 목록에서 선택하세요.");
        return;
      }

      if (!state[prefix].selectedSuggestion || state[prefix].selectedSuggestion !== value) {
        alert("추천 목록에서 실제 존재하는 회사명을 선택한 뒤 + 버튼을 눌러주세요.");
        return;
      }

      if (!state[prefix].selectedCompanies.includes(value)) {
        state[prefix].selectedCompanies.push(value);
      }

      input.value = "";
      state[prefix].selectedSuggestion = null;
      document.getElementById(`${prefix}Suggestions`).style.display = "none";
      statusBox.textContent = "추가 완료";
      renderSelectedCompanies(prefix);
    }

    function attachSearchListener(prefix) {
      const input = document.getElementById(`${prefix}CompanySearch`);

      input.addEventListener("input", () => {
        state[prefix].selectedSuggestion = null;
        clearTimeout(state[prefix].suggestionTimer);
        state[prefix].suggestionTimer = setTimeout(() => fetchSuggestions(prefix), 180);
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addSelectedCompany(prefix);
        }
      });
    }

    async function startDownload(prefix) {
      const startDate = document.getElementById(`${prefix}StartDate`).value;
      const endDate = document.getElementById(`${prefix}EndDate`).value;
      const companyMode = document.getElementById(`${prefix}CompanyMode`).value;
      const errorBox = document.getElementById(`${prefix}ErrorBox`);
      const progressWrap = document.getElementById(`${prefix}ProgressWrap`);
      const progressFill = document.getElementById(`${prefix}ProgressFill`);
      const progressText = document.getElementById(`${prefix}ProgressText`);

      errorBox.textContent = "";

      if (!startDate || !endDate) {
        alert("시작일과 종료일을 입력하세요.");
        return;
      }

      if (startDate > endDate) {
        alert("시작일은 종료일보다 늦을 수 없습니다.");
        return;
      }

      if (companyMode === "select" && state[prefix].selectedCompanies.length === 0) {
        alert("회사를 하나 이상 추가하세요.");
        return;
      }

      progressWrap.style.display = "block";
      progressFill.style.width = "0%";
      progressText.textContent = "작업 시작 중...";

      const payload = {
        start_date: startDate,
        end_date: endDate,
        companies: companyMode === "all" ? [] : state[prefix].selectedCompanies
      };

      let apiUrl = "/start-download";
      if (prefix === "rm") apiUrl = "/start-regular-download";
      if (prefix === "nps") apiUrl = "/start-nps-download";

      try {
        const res = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const rawText = await res.text();

        let data = {};
        try {
          data = JSON.parse(rawText);
        } catch (e) {
          errorBox.textContent =
            "작업 시작 실패\n\n응답(JSON 아님):\n" + rawText;
          return;
        }

        if (!data.job_id) {
          errorBox.textContent =
            "작업 시작 실패\n\n응답:\n" + JSON.stringify(data, null, 2);
          return;
        }

        const jobId = data.job_id;

        if (state[prefix].pollTimer) {
          clearInterval(state[prefix].pollTimer);
        }

        state[prefix].pollTimer = setInterval(async () => {
          const statusRes = await fetch(`/job-status/${jobId}`);
          const statusText = await statusRes.text();

          let status = {};
          try {
            status = JSON.parse(statusText);
          } catch (e) {
            errorBox.textContent = "상태 조회 실패\n\n응답:\n" + statusText;
            clearInterval(state[prefix].pollTimer);
            return;
          }

          if (status.progress) {
            progressFill.style.width = `${status.progress.percent || 0}%`;
            progressText.textContent = status.progress.message || "처리 중...";
          }

          if (status.state === "done") {
            clearInterval(state[prefix].pollTimer);
            progressFill.style.width = "100%";
            progressText.textContent = "완료! 다운로드를 시작합니다.";
            window.location.href = status.download_url;
          }

          if (status.state === "error") {
            clearInterval(state[prefix].pollTimer);
            errorBox.textContent =
              (status.error || "오류 발생") +
              "\n\nstdout:\n" + (status.stdout || "") +
              "\n\nstderr:\n" + (status.stderr || "");
            progressText.textContent = "오류가 발생했습니다.";
          }
        }, 1500);

      } catch (e) {
        errorBox.textContent = "요청 중 오류 발생: " + e.message;
      }
    }

    function init() {
      setDateRanges();
      attachSearchListener("cg");
      attachSearchListener("rm");
      attachSearchListener("nps");
    }

    init();
  </script>
</body>
</html>
