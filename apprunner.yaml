version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install -r requirements.txt
      - mkdir -p /app/pw-browsers
      - PLAYWRIGHT_BROWSERS_PATH=/app/pw-browsers python3 -m playwright install chromium

run:
  runtime-version: 3.11

  env:
    - name: PLAYWRIGHT_BROWSERS_PATH
      value: /app/pw-browsers

  command: python3 -m uvicorn server:app --host 0.0.0.0 --port 8000

  network:
    port: 8000