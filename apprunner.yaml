version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install -r requirements.txt

run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: python3 -m uvicorn server:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  secrets:
    - name: DART_API_KEY
      value-from: "arn:aws:secretsmanager:us-east-1:149997403349:secret:DART_API_KEY-DcBt2m"
    - name: OPENAI_API_KEY
      value-from: "arn:aws:secretsmanager:us-east-1:149997403349:secret:open_ai_api-ra3PxX"


