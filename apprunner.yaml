version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m pip install --upgrade pip
      - python3 -m pip install -r requirements.txt

run:
  runtime-version: 3.11
  command: python3 -m uvicorn server:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  secrets:
    - name: DART_API_KEY
      value-from: "arn:aws:secretsmanager:us-east-1:149997403349:secret:DART_API_KEY-DcBt2m"
    - name: OPENAI_API_KEY
      value-from: "arn:aws:secretsmanager:us-east-1:149997403349:secret:OPENAI_API_KEY-XXXXXX"
